<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Election Results</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    .card {
      background: #1e293b;
      margin: 10px auto;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .party {
      font-size: 22px;
      margin: 10px 0;
    }
    .seats {
      font-size: 28px;
      font-weight: bold;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>📊 Live Election Results</h1>

<div class="card">
  <div class="party">TMC</div>
  <div class="seats" id="tmc">Loading...</div>
</div>

<div class="card">
  <div class="party">BJP</div>
  <div class="seats" id="bjp">Loading...</div>
</div>

<button onclick="updateResults()">Refresh</button>

<script>
function updateResults() {
  // Demo random data
  let tmc = Math.floor(Math.random() * (152 - 131 + 1)) + 131;
  let bjp = Math.floor(Math.random() * (159 - 138 + 1)) + 138;

  document.getElementById("tmc").innerText = tmc;
  document.getElementById("bjp").innerText = bjp;
}

// Auto refresh every 5 seconds
setInterval(updateResults, 5000);
updateResults();
</script>

</body>
</html>
