<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Election Result Display</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

h1{
  margin-bottom:10px;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.box{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  width:160px;
}

.party{
  font-size:18px;
  font-weight:bold;
}

.seats{
  font-size:28px;
  color:#22c55e;
  margin-top:5px;
}

/* highlight winner */
.winner{
  border:2px solid #22c55e;
}

.note{
  margin-top:15px;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>

<h1>📊 Election Result Dashboard</h1>

<div class="container">

  <div class="box winner">
    <div class="party">BJP</div>
    <div class="seats">193</div>
  </div>

  <div class="box">
    <div class="party">TMC</div>
    <div class="seats">90</div>
  </div>

  <div class="box">
    <div class="party">LF + ISF</div>
    <div class="seats">3</div>
  </div>

  <div class="box">
    <div class="party">CPIM</div>
    <div class="seats">0</div>
  </div>

  <div class="box">
    <div class="party">Congress</div>
    <div class="seats">0</div>
  </div>

  <div class="box">
    <div class="party">OTH</div>
    <div class="seats">2</div>
  </div>

</div>

<div class="note">
📌 Data Display (Static Dashboard View)
</div>

</body>
</html>
