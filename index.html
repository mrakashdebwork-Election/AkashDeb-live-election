<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WB Election Level 5 Pro Max | By AkashDeb</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

h1{
  margin-bottom:5px;
}

.brand{
  font-size:14px;
  color:#22c55e;
  margin-bottom:10px;
}

.summary{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.box{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  min-width:120px;
}

.seats{
  font-size:22px;
  font-weight:bold;
  color:#22c55e;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  width:300px;
  text-align:left;
}

.lead{
  color:#22c55e;
  font-weight:bold;
}

.bar{
  height:6px;
  background:#334155;
  border-radius:5px;
  overflow:hidden;
  margin:3px 0 8px 0;
}

.fill{
  height:100%;
  background:#22c55e;
  width:0%;
  transition:0.8s;
}

button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* FOOTER */
footer{
  margin-top:25px;
  font-size:12px;
  color:#94a3b8;
}
</style>
</head>

<body>

<h1>📊 WB Election Level 5 Pro Max</h1>

<div class="brand">
By - <b>AkashDeb</b> | Instagram - @AkashDebX
</div>

<div class="summary">
  <div class="box">TMC <div class="seats" id="tmc">0</div></div>
  <div class="box">BJP <div class="seats" id="bjp">0</div></div>
  <div class="box">CPIM <div class="seats" id="cpim">0</div></div>
  <div class="box">CONG <div class="seats" id="cong">0</div></div>
</div>

<button onclick="render()">Refresh Live</button>

<div id="results" class="container"></div>

<footer>
WB Election Level 5 Pro Max © 2026 <br>
Developed by <b>AkashDeb</b> <br>
Instagram: @AkashDebX
</footer>

<script>

const districts=[
"Kolkata","Howrah","Hooghly","North 24 Parganas","South 24 Parganas",
"Nadia","Murshidabad","Malda","Birbhum","Bardhaman",
"Purulia","Bankura","Jalpaiguri","Darjeeling","Cooch Behar",
"Alipurduar","Uttar Dinajpur","Dakshin Dinajpur","Medinipur East",
"Medinipur West","Jhargram","Kalimpong","Asansol"
];

function votes(){
  return{
    TMC:Math.floor(Math.random()*50000+20000),
    BJP:Math.floor(Math.random()*50000+20000),
    CPIM:Math.floor(Math.random()*20000+5000),
    CONG:Math.floor(Math.random()*15000+3000)
  };
}

function render(){

  let total={TMC:0,BJP:0,CPIM:0,CONG:0};
  let html="";

  districts.forEach(d=>{

    let v=votes();

    total.TMC+=v.TMC;
    total.BJP+=v.BJP;
    total.CPIM+=v.CPIM;
    total.CONG+=v.CONG;

    let arr=[
      {p:"TMC",v:v.TMC},
      {p:"BJP",v:v.BJP},
      {p:"CPIM",v:v.CPIM},
      {p:"CONG",v:v.CONG}
    ];

    arr.sort((a,b)=>b.v-a.v);

    let winner=arr[0].p;
    let max=arr[0].v;

    html+=`
      <div class="card">
        <h3>${d}</h3>
        <p class="lead">🏆 Leading: ${winner}</p>
    `;

    arr.forEach(x=>{
      let percent=(x.v/max)*100;

      html+=`
        <div>${x.p} - ${x.v}</div>
        <div class="bar"><div class="fill" style="width:${percent}%"></div></div>
      `;
    });

    html+=`</div>`;
  });

  document.getElementById("results").innerHTML=html;

  document.getElementById("tmc").innerText=total.TMC;
  document.getElementById("bjp").innerText=total.BJP;
  document.getElementById("cpim").innerText=total.CPIM;
  document.getElementById("cong").innerText=total.CONG;
}

render();
setInterval(render,5000);

</script>

</body>
</html>
