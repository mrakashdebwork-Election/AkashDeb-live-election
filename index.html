<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WB Live Election Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
h1 { margin: 20px; }

.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
}

.lead { color: #22c55e; font-weight: bold; }
</style>
</head>

<body>

<h1>📊 WB Live Election Dashboard</h1>
<div id="results"></div>

<script>

const data = [
  {
    district: "Kolkata",
    results: [
      {party:"TMC", candidate:"Rahul Sen", votes:45000},
      {party:"BJP", candidate:"Amit Das", votes:42000},
      {party:"CPIM", candidate:"Suman Roy", votes:12000}
    ]
  },
  {
    district: "Howrah",
    results: [
      {party:"TMC", candidate:"Ravi Sharma", votes:38000},
      {party:"BJP", candidate:"Ankit Singh", votes:36000},
      {party:"CPIM", candidate:"Soham Ghosh", votes:15000}
    ]
  }
];

function render(){
  let output = "";

  data.forEach(d => {
    let sorted = d.results.sort((a,b)=>b.votes-a.votes);
    let lead = sorted[0].votes - sorted[1].votes;

    output += `
      <div class="card">
        <h3>${d.district}</h3>
        <p class="lead">Leading: ${sorted[0].party} (${sorted[0].candidate})</p>
        <p>Lead: ${lead} votes</p>
        <hr>
        ${sorted.map(r => `<p>${r.party} - ${r.candidate}: ${r.votes}</p>`).join("")}
      </div>
    `;
  });

  document.getElementById("results").innerHTML = output;
}

render();

</script>

</body>
</html>
